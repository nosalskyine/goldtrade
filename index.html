<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="apple-touch-icon" href="icon-192.png">
<title>GoldTrade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f0f23;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  overflow: hidden;
}
#loader {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}
.logo {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, #ffd700, #ff8c00);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; font-weight: 700; color: #1a1a2e;
  margin-bottom: 20px;
}
.title { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.status { color: #8a8a9a; font-size: 14px; margin-bottom: 30px; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid #333;
  border-top: 3px solid #ffd700;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn {
  display: none;
  padding: 14px 40px;
  background: #5eaaef;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.error { display: none; color: #ff3a44; font-size: 14px; margin-bottom: 16px; text-align: center; padding: 0 20px; }
#app {
  display: none;
  width: 100%;
  height: 100vh;
  border: none;
}
</style>
</head>
<body>

<div id="loader">
  <div class="logo">G</div>
  <div class="title">GoldTrade</div>
  <div class="status" id="status">Connecting...</div>
  <div class="spinner" id="spinner"></div>
  <div class="error" id="error"></div>
  <button class="btn" id="btn"></button>
</div>

<iframe id="app" allow="fullscreen"></iframe>

<script>
var STATUS = document.getElementById('status');
var SPINNER = document.getElementById('spinner');
var ERROR = document.getElementById('error');
var BTN = document.getElementById('btn');
var LOADER = document.getElementById('loader');
var APP = document.getElementById('app');

var isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

function loadApp() {
  STATUS.textContent = 'Connecting...';
  SPINNER.style.display = 'block';
  ERROR.style.display = 'none';
  BTN.style.display = 'none';

  fetch('url.txt?t=' + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(url) {
      url = url.trim();
      if (!url || !url.startsWith('http')) {
        showError('Server not configured');
        return;
      }
      if (isStandalone) {
        // PWA mode — load inside iframe to keep standalone look
        APP.src = url;
        APP.onload = function() {
          LOADER.style.display = 'none';
          APP.style.display = 'block';
        };
        // Fallback if iframe blocks
        setTimeout(function() {
          if (APP.style.display !== 'block') {
            LOADER.style.display = 'none';
            APP.style.display = 'block';
          }
        }, 3000);
      } else {
        // Browser — show add to home hint
        SPINNER.style.display = 'none';
        STATUS.textContent = 'Додай цю сторінку на головний екран';
        BTN.textContent = 'Я додав, продовжити';
        BTN.style.display = 'inline-block';
        BTN.onclick = function() { window.location.href = url; };
      }
    })
    .catch(function() {
      showError('No internet connection');
    });
}

function showError(msg) {
  SPINNER.style.display = 'none';
  STATUS.textContent = '';
  ERROR.textContent = msg;
  ERROR.style.display = 'block';
  BTN.textContent = 'Retry';
  BTN.style.display = 'inline-block';
  BTN.onclick = function() { loadApp(); };
}

loadApp();
</script>
</body>
</html>
